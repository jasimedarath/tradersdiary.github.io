plugins {
  id "com.android.application"
  id "org.jetbrains.kotlin.android"
}

android {
  namespace "com.swingtradetracker.app"
  compileSdk 34

  defaultConfig {
    applicationId "com.swingtradetracker.app"
    minSdk 24
    targetSdk 34
    versionCode 1
    versionName "1.0"

    def configuredUrl = project.findProperty("appUrl") ?: "https://example.github.io/swing-trade-tracker/"
    buildConfigField "String", "APP_URL", "\"${configuredUrl}\""
  }

  buildTypes {
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  buildFeatures {
    buildConfig true
  }
}

dependencies {
  implementation "androidx.core:core-ktx:1.13.1"
  implementation "androidx.appcompat:appcompat:1.7.0"
  implementation "com.google.android.material:material:1.12.0"
}
